<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Rishabh Kumar — AI systems that don't fail silently">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- grid -->
  <g stroke="#161b22" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1050" y1="0" x2="1050" y2="300"/>
  </g>

  <!-- heartbeat trace across the banner -->
  <polyline fill="none" stroke="#238636" stroke-width="1.5" opacity="0.35"
    points="0,210 90,210 110,210 118,196 126,224 134,210 260,210 280,210 288,193 296,227 304,210 470,210 490,210 498,190 506,230 514,210 700,210 720,210 728,195 736,225 744,210 930,210 950,210 958,192 966,228 974,210 1200,210"/>
  <polyline fill="none" stroke="url(#pulse)" stroke-width="2.5" filter="url(#glow)"
    points="470,210 490,210 498,190 506,230 514,210 700,210"/>

  <!-- title -->
  <text x="72" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="44" font-weight="700" fill="#e6edf3" filter="url(#softglow)">RISHABH KUMAR</text>
  <text x="74" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#7d8590">I build AI systems that run in production — <tspan fill="#3fb950">and don't fail silently.</tspan></text>

  <!-- blinking cursor block -->
  <rect x="478" y="88" width="14" height="34" fill="#3fb950" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- status tiles -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
    <g transform="translate(72,236)">
      <rect width="240" height="36" rx="6" fill="#0d1117" stroke="#21262d"/>
      <circle cx="18" cy="18" r="4" fill="#3fb950" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="22" fill="#e6edf3">milo-agent-api</text>
      <text x="168" y="22" fill="#3fb950">P50&lt;500ms</text>
    </g>
    <g transform="translate(328,236)">
      <rect width="240" height="36" rx="6" fill="#0d1117" stroke="#21262d"/>
      <circle cx="18" cy="18" r="4" fill="#3fb950" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="22" fill="#e6edf3">voice-gateway</text>
      <text x="168" y="22" fill="#3fb950">P99 300ms</text>
    </g>
    <g transform="translate(584,236)">
      <rect width="240" height="36" rx="6" fill="#0d1117" stroke="#21262d"/>
      <circle cx="18" cy="18" r="4" fill="#3fb950" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="22" fill="#e6edf3">remalt.com</text>
      <text x="168" y="22" fill="#58a6ff">10k+ users</text>
    </g>
    <g transform="translate(840,236)">
      <rect width="288" height="36" rx="6" fill="#0d1117" stroke="#21262d"/>
      <circle cx="18" cy="18" r="4" fill="#d29922" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="22" fill="#e6edf3">silent-failures</text>
      <text x="176" y="22" fill="#d29922">0 tolerated</text>
    </g>
  </g>

  <!-- top-right uptime chip -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
    <rect x="1010" y="24" width="118" height="26" rx="13" fill="#0d1117" stroke="#238636"/>
    <circle cx="1028" cy="37" r="4" fill="#3fb950" filter="url(#glow)"/>
    <text x="1040" y="41" fill="#3fb950">ON CALL</text>
  </g>
</svg>
