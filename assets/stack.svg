<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" role="img" aria-label="Stack — the dashboard row">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="150" fill="url(#sbg)"/>

  <text x="40" y="32" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#7d8590">DASHBOARD <tspan fill="#3fb950">stack.overview</tspan> — every panel green</text>

